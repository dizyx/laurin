<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Laurin Logo — B3 Wine Rose, Trefoil Key (dark background variant) -->
  <!-- Background circle for use on any surface -->
  <circle cx="24" cy="24" r="24" fill="#0a0a0a"/>
  <!-- Five alpine rose petals -->
  <ellipse cx="24" cy="16" rx="6" ry="8" fill="#B5485E" opacity="0.8"/>
  <ellipse cx="31.6" cy="20.8" rx="6" ry="8" fill="#B5485E" opacity="0.7" transform="rotate(72, 31.6, 20.8)"/>
  <ellipse cx="28.7" cy="29.5" rx="6" ry="8" fill="#B5485E" opacity="0.6" transform="rotate(144, 28.7, 29.5)"/>
  <ellipse cx="19.3" cy="29.5" rx="6" ry="8" fill="#B5485E" opacity="0.6" transform="rotate(216, 19.3, 29.5)"/>
  <ellipse cx="16.4" cy="20.8" rx="6" ry="8" fill="#B5485E" opacity="0.7" transform="rotate(288, 16.4, 20.8)"/>
  <!-- Center void -->
  <circle cx="24" cy="24" r="7" fill="#0a0a0a"/>
  <!-- Trefoil bow key (three-lobed ornate handle) -->
  <circle cx="24" cy="17" r="2.2" fill="none" stroke="#D4A843" stroke-width="1.3"/>
  <circle cx="21.5" cy="19.5" r="2" fill="none" stroke="#D4A843" stroke-width="1.3"/>
  <circle cx="26.5" cy="19.5" r="2" fill="none" stroke="#D4A843" stroke-width="1.3"/>
  <!-- Shaft -->
  <line x1="24" y1="21.5" x2="24" y2="33" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Ward teeth (flag-style) -->
  <path d="M24,30 L28,29 L28,31 L24,30Z" fill="#D4A843"/>
  <path d="M24,33 L27,32 L27,34 L24,33Z" fill="#D4A843"/>
</svg>